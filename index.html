  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 240'%3E%3Cellipse cx='100' cy='120' rx='60' ry='70' fill='%230D0D0D' stroke='%23FFFFFF' stroke-width='3'/%3E%3Crect x='80' y='35' width='40' height='30' fill='%230D0D0D' stroke='%23FFFFFF' stroke-width='3'/%3E%3Cellipse cx='100' cy='35' rx='20' ry='8' fill='%23F5E642' stroke='%23FFFFFF' stroke-width='2'/%3E%3Crect x='85' y='30' width='30' height='6' fill='%23FFFFFF'/%3E%3Cline x1='85' y1='80' x2='115' y2='80' stroke='%23F5E642' stroke-width='2' fill='none'/%3E%3Cline x1='75' y1='120' x2='125' y2='120' stroke='%23F5E642' stroke-width='2' fill='none'/%3E%3Cline x1='80' y1='160' x2='120' y2='160' stroke='%23F5E642' stroke-width='2' fill='none'/%3E%3Crect x='70' y='145' width='60' height='8' fill='%23F5E642' stroke='%23FFFFFF' stroke-width='2'/%3E%3Cpath d='M 60 175 Q 100 190 140 175' stroke='%23F5E642' stroke-width='2' fill='none'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0D0D0D;
      --card:    #111111;
      --border:  #FFFFFF;
      --accent:  #F5E642;
      --red:     #FF3B3B;
      --fg:      #FFFFFF;
      --muted:   #555555;
      --dark:    #1A1A1A;
      --track:   #2A2A2A;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top))
               max(24px, env(safe-area-inset-right))
               max(24px, env(safe-area-inset-bottom))
               max(24px, env(safe-area-inset-left));
    }

    .card {
      width: min(380px, 100%);
      background: var(--card);
      border: 3px solid var(--border);
      box-shadow: 7px 7px 0 var(--accent);
    }

    @media (max-width: 480px) {
      body {
        padding: max(12px, env(safe-area-inset-top))
                 max(12px, env(safe-area-inset-right))
                 max(12px, env(safe-area-inset-bottom))
                 max(12px, env(safe-area-inset-left));
      }
      .card { box-shadow: 5px 5px 0 var(--accent); }
    }

    /* App installée (standalone / fullscreen) : plein écran bord-à-bord,
       la zone d'état (encoche) est absorbée par les safe-area insets. */
    @media (display-mode: standalone), (display-mode: fullscreen) {
      body {
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
        justify-content: flex-start;
      }
      .card {
        width: 100%;
        flex: 1;
        border-left: none;
        border-right: none;
        box-shadow: none;
        display: flex;
        flex-direction: column;
      }
      /* L'espace vertical excédentaire va à l'artwork, pas à un vide en bas */
      .artwork { flex: 1; aspect-ratio: auto; min-height: 180px; }
      .card .footer { margin-top: auto; }
      .footer {
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        padding-left: max(18px, env(safe-area-inset-left));
        padding-right: max(18px, env(safe-area-inset-right));
      }
    }

    /* ── Header ── */
    .header {
      border-bottom: 3px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-weight: 700;
      font-size: 1.45rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-svg { width: 28px; height: 28px; display: inline-block; }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--red);
      flex-shrink: 0;
      animation: blink 1.4s step-start infinite;
    }
    .badge-flag {
      display: block;
      width: 42px; height: 28px;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Artwork ── */
    .artwork {
      border-bottom: 3px solid var(--border);
      background: var(--dark);
      aspect-ratio: 16/9;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
      background-size: cover;
      background-position: center;
    }
    .visualizer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding: 12px;
      z-index: 1;
    }
    .bar {
      flex: 1;
      background: var(--accent);
      opacity: .85;
      animation: vbar var(--d, .7s) ease-in-out infinite alternate;
      height: 3px;
    }
    @keyframes vbar { from { height: 3px; } to { height: var(--h, 28px); } }
    .visualizer.stopped .bar { animation-play-state: paused; }
    .visualizer.live .bar { animation: none; transition: height 70ms linear; }

    /* ── Track ── */
    .track-block {
      padding: 14px 18px;
      border-bottom: 3px solid var(--border);
    }
    .track-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .track-label {
      font-family: 'Space Mono', monospace;
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .listeners {
      font-family: 'Space Mono', monospace;
      font-size: .6rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .listeners.show { display: inline-flex; }
    .listeners .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      animation: blink 1.4s step-start infinite;
    }
    .track-title-wrap {
      overflow: hidden;
      mask-image: linear-gradient(to right, black 80%, transparent 100%);
    }
    .track-title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .03em;
      text-transform: uppercase;
      line-height: 1.2;
      white-space: nowrap;
      display: inline-block;
    }
    .track-title.scroll { animation: marquee 14s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .track-artist {
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      color: #888;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .genre-badge {
      margin-top: 10px;
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border: 2px solid var(--border);
    }
    .genre-morning  { background: #F5E642; color: #0D0D0D; }
    .genre-afternoon { background: #A5F5E6; color: #0D0D0D; }
    .genre-late     { background: #F5A842; color: #0D0D0D; }
    .genre-evening  { background: #C4A5F5; color: #0D0D0D; }

    /* ── Actions (chercher / partager / réagir) ── */
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .chip {
      font-family: 'Space Mono', monospace;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--fg);
      background: transparent;
      border: 2px solid var(--track);
      padding: 5px 9px;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: border-color 120ms, color 120ms, background 120ms;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip-fire {
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip-fire.pop { animation: pop 340ms ease; }
    @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.22); } 100% { transform: scale(1); } }
    .fire-float {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      z-index: 40;
      animation: floatUp 900ms ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-46px) scale(1.5); }
    }

    /* ── Ticker ── */
    .ticker {
      border-bottom: 3px solid var(--border);
      background: var(--accent);
      overflow: hidden;
      padding: 7px 0;
    }
    .ticker-inner {
      display: inline-block;
      white-space: nowrap;
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      font-weight: 700;
      color: var(--bg);
      letter-spacing: .14em;
      text-transform: uppercase;
      animation: ticker 80s linear infinite;
    }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── Controls ── */
    .controls {
      padding: 18px;
      border-bottom: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .btn-ghost {
      width: 38px; height: 38px;
      background: transparent;
      border: 2px solid #2A2A2A;
      color: #333;
      display: flex; align-items: center; justify-content: center;
      cursor: not-allowed;
      flex-shrink: 0;
    }
    .btn-play {
      width: 62px; height: 62px;
      background: var(--accent);
      color: var(--bg);
      border: 3px solid var(--border);
      box-shadow: 4px 4px 0 var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 80ms, box-shadow 80ms;
      flex-shrink: 0;
    }
    .btn-play:hover  { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--border); }
    .btn-play:active { transform: translate(4px, 4px); box-shadow: none; }
    .btn-play:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    /* ── Volume + sleep ── */
    .volume-row {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid var(--border);
    }
    .vol-label {
      font-family: 'Space Mono', monospace;
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      flex-shrink: 0;
      min-width: 28px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 5px;
      background: var(--track);
      outline: none;
      border: 1px solid #444;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent);
      border: 2px solid var(--border);
      cursor: pointer;
    }
    .sleep-btn {
      font-family: 'Space Mono', monospace;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: 2px solid var(--track);
      padding: 5px 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 120ms, color 120ms;
    }
    .sleep-btn.on { color: var(--accent); border-color: var(--accent); }

    /* ── Panneaux dépliables (historique / programme) ── */
    .panel {
      border-bottom: 3px solid var(--border);
    }
    .panel > summary {
      list-style: none;
      cursor: pointer;
      padding: 11px 18px;
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .panel > summary::-webkit-details-marker { display: none; }
    .panel > summary .chev { color: var(--accent); transition: transform 180ms; }
    .panel[open] > summary .chev { transform: rotate(90deg); }
    .panel-body { padding: 4px 18px 14px; }

    .hist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-top: 1px solid #222;
    }
    .hist-item:first-child { border-top: none; }
    .hist-art {
      width: 34px; height: 34px;
      background: var(--dark) center/cover no-repeat;
      border: 1px solid #333;
      flex-shrink: 0;
    }
    .hist-meta { min-width: 0; }
    .hist-title {
      font-size: .74rem;
      font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hist-artist {
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      color: #888;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .prog-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid #222;
      font-family: 'Space Mono', monospace;
    }
    .prog-item:first-child { border-top: none; }
    .prog-item.now { background: rgba(245,230,66,.07); margin: 0 -18px; padding-left: 18px; padding-right: 18px; }
    .prog-time {
      font-size: .64rem;
      color: var(--accent);
      font-weight: 700;
      min-width: 82px;
      flex-shrink: 0;
    }
    .prog-label { font-size: .64rem; color: #ccc; letter-spacing: .04em; }
    .prog-item.now .prog-label { color: var(--fg); font-weight: 700; }
    .prog-live {
      margin-left: auto;
      font-size: .5rem;
      color: var(--bg);
      background: var(--accent);
      padding: 2px 6px;
      letter-spacing: .1em;
    }
    .prog-note {
      font-family: 'Space Mono', monospace;
      font-size: .54rem;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: .06em;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .footer-text {
      font-family: 'Space Mono', monospace;
      font-size: .58rem;
      color: #333;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .footer-status {
      font-family: 'Space Mono', monospace;
      font-size: .58rem;
      color: var(--accent);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .footer-donate {
      width: 100%;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--accent);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .donate-link, .install-link {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 2px solid var(--border);
      text-decoration: none;
      cursor: pointer;
      transition: transform 80ms, box-shadow 80ms;
    }
    .install-link { background: transparent; color: var(--fg); display: none; }
    .install-link.show { display: inline-block; }
    .donate-link:hover, .install-link:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--border); }
    .donate-link:active, .install-link:active { transform: translate(4px, 4px); box-shadow: none; }

    /* ── Bandeau d'installation (mobile) ── */
    .install-toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      z-index: 50;
      max-width: 380px;
      margin: 0 auto;
      background: var(--card);
      border: 3px solid var(--border);
      box-shadow: 5px 5px 0 var(--accent);
      padding: 14px 16px;
      display: none;
      gap: 10px;
      transform: translateY(0);
      animation: toastUp 260ms ease-out;
    }
    .install-toast.show { display: flex; }
    @keyframes toastUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .install-toast-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      color: var(--bg);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .install-toast-body { flex: 1; min-width: 0; }
    .install-toast-title {
      font-weight: 700;
      font-size: .82rem;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .install-toast-text {
      font-family: 'Space Mono', monospace;
      font-size: .66rem;
      color: #999;
      margin-top: 4px;
      line-height: 1.5;
    }
    .install-toast-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .install-toast-cta {
      background: var(--accent);
      color: var(--bg);
      border: 2px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
    }
    .install-toast-later {
      background: transparent;
      color: #888;
      border: 2px solid var(--track);
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
    }
    .install-toast-close {
      background: transparent;
      border: none;
      color: #666;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      padding: 2px 4px;
    }
    .install-toast-share-icon { flex-shrink: 0; vertical-align: -3px; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .bar, .logo-dot, .track-title { animation: none; }
    }
  </style>
</head>
<body>

  <main class="card" role="main" aria-label="Lecteur KALBASSFM">

    <div class="header">
      <h1 class="logo">
        <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" aria-hidden="true">
          <ellipse cx="100" cy="120" rx="60" ry="70" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="3"/>
          <rect x="80" y="35" width="40" height="30" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="3"/>
          <ellipse cx="100" cy="35" rx="20" ry="8" fill="#F5E642" stroke="#FFFFFF" stroke-width="2"/>
          <rect x="85" y="30" width="30" height="6" fill="#FFFFFF"/>
          <line x1="85" y1="80" x2="115" y2="80" stroke="#F5E642" stroke-width="2"/>
          <line x1="75" y1="120" x2="125" y2="120" stroke="#F5E642" stroke-width="2"/>
          <line x1="80" y1="160" x2="120" y2="160" stroke="#F5E642" stroke-width="2"/>
          <rect x="70" y="145" width="60" height="8" fill="#F5E642" stroke="#FFFFFF" stroke-width="2"/>
          <path d="M 60 175 Q 100 190 140 175" stroke="#F5E642" stroke-width="2" fill="none"/>
        </svg>
        <span id="stationName">KALBASSFM</span>
      </h1>
      <svg class="badge-flag" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drapeau de la Martinique">
        <rect width="900" height="300" fill="#00A551"/>
        <rect y="300" width="900" height="300" fill="#231F20"/>
        <polygon points="0,0 450,300 0,600" fill="#ED1C24"/>

    <div class="artwork" id="artwork" role="img" aria-label="Artwork de la piste en cours">

    <div class="track-block">

    <div class="controls">
      <button class="btn-ghost" disabled aria-label="Piste précédente (non disponible en direct)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
        </svg>

      <button class="btn-play" id="btnPlay" aria-label="Lecture" aria-pressed="false">

        <svg id="icPause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>

      <button class="btn-ghost" disabled aria-label="Piste suivante (non disponible en direct)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>

    <div class="volume-row">
      <span class="vol-label">VOL</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
      <span class="vol-label" id="volVal">80</span>
      <button class="sleep-btn" id="sleepBtn" aria-label="Minuteur de sommeil">💤 OFF</button>
    </div>

    <details class="panel" id="histPanel">
      <summary>Historique <span class="chev">›</span></summary>
      <div class="panel-body">
        <div id="historyList"></div>
      </div>
    </details>

    <details class="panel" id="progPanel">
      <summary>Programme du jour <span class="chev">›</span></summary>
      <div class="panel-body">
        <div id="progList"></div>
        <p class="prog-note">Horaires Antilles (heure de Martinique · UTC−4)</p>
      </div>
    </details>

    <div class="footer">
      <span class="footer-text">// FM CARAÏBES</span>
      <div class="footer-status">
        <span class="logo-dot" style="width:5px;height:5px;" aria-hidden="true"></span>
        <span id="footerStatus">EN ATTENTE</span>
      </div>
      <div class="footer-donate">
        <a href="https://buymeacoffee.com/kalbassfm" target="_blank" rel="noopener noreferrer" class="donate-link">☕ Support</a>
        <button class="install-link" id="installBtn">⬇ Installer l'app</button>
      </div>
    </div>

  </main>

  <div class="install-toast" id="installToast" role="dialog" aria-label="Installer KALBASS FM">
    <div class="install-toast-icon" aria-hidden="true">📻</div>
    <div class="install-toast-body">
      <div class="install-toast-title">Installez KALBASS FM</div>
      <div class="install-toast-text" id="installToastText">
        Profitez d'un accès direct depuis votre écran d'accueil, sans navigateur.
      </div>
      <div class="install-toast-actions">
        <button class="install-toast-cta" id="installToastCta" style="display:none">Installer</button>
        <button class="install-toast-later" id="installToastLater">Plus tard</button>
      </div>
    </div>
    <button class="install-toast-close" id="installToastClose" aria-label="Fermer">✕</button>
  </div>

  <audio id="audio" preload="none"></audio>

  <script>
  const CONFIG = {
    streamUrl:   'https://kalbassfm.duckdns.org/listen/kalbassfm/radio.mp3',
    apiUrl:      'https://kalbassfm.duckdns.org/api/nowplaying/kalbassfm',
    stationName: 'KALBASSFM',
    pollMs:      8000,
  };

  // Grille de programmation — heure de Martinique (UTC−4).
  // Un créneau peut traverser minuit (from > to), ex. 23h → 06h.
  const SLOTS = [
    { from:  6, to: 12, label: 'DISCO · FUNK · SOULFUL',      cls: 'genre-morning',   icon: '🌅' },
    { from: 12, to: 19, label: 'DEEP HOUSE · HOUSE',          cls: 'genre-afternoon', icon: '☀️' },
    { from: 19, to: 23, label: 'TECH HOUSE · DEEP TECH',      cls: 'genre-late',      icon: '🌆' },
    { from: 23, to:  6, label: 'TECHNO · TRANCE · DEEP TECH', cls: 'genre-evening',   icon: '🌙' },
  ];

  // Heure de la Martinique (UTC−4, pas de changement d'heure) quel que soit le fuseau du visiteur
  function martiniqueHour() {
    const now = new Date();
    return (now.getUTCHours() + 24 - 4) % 24;
  }
  function inSlot(h, s) {
    return s.from < s.to ? (h >= s.from && h < s.to) : (h >= s.from || h < s.to);
  }
  function currentSlot() {
    const h = martiniqueHour();
    return SLOTS.find(s => inSlot(h, s)) || SLOTS[0];
  }

  const audio     = document.getElementById('audio');
  const btnPlay   = document.getElementById('btnPlay');
  const icPlay    = document.getElementById('icPlay');
  const icPause   = document.getElementById('icPause');
  const volSlider = document.getElementById('volSlider');
  const volVal    = document.getElementById('volVal');
  const titleEl   = document.getElementById('trackTitle');
  const artistEl  = document.getElementById('trackArtist');
  const badgeEl   = document.getElementById('genreBadge');
  const footerSt  = document.getElementById('footerStatus');
  const viz       = document.getElementById('visualizer');
  const artwork   = document.getElementById('artwork');
  const listenersEl = document.getElementById('listeners');
  const listenersCount = document.getElementById('listenersCount');
  const actionsRow = document.getElementById('actionsRow');
  const reactBtn  = document.getElementById('reactBtn');
  const reactCount = document.getElementById('reactCount');
  const shareBtn  = document.getElementById('shareBtn');
  const findYT    = document.getElementById('findYT');
  const historyList = document.getElementById('historyList');
  const progList  = document.getElementById('progList');

  document.getElementById('stationName').textContent = CONFIG.stationName;
  document.title = CONFIG.stationName + ' — FM Caraïbes';
  audio.volume = parseFloat(volSlider.value);

  let current = { title: '', artist: '', art: '', songId: '' };

  /* ── Visualiseur ── */
  const barEls = [];
  for (let i = 0; i < 22; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    const h = Math.round(Math.random() * 52 + 6);
    const d = (Math.random() * 0.5 + 0.35).toFixed(2);
    b.style.setProperty('--h', h + 'px');
    b.style.setProperty('--d', d + 's');
    b.style.animationDelay = (Math.random() * 0.4).toFixed(2) + 's';
    viz.appendChild(b);
    barEls.push(b);
  }

  // Router l'audio via createMediaElementSource lie la lecture à l'AudioContext,
  // que les OS mobiles suspendent à l'écran verrouillé → le son se coupe après
  // quelques secondes. Sur mobile on garde donc la sortie <audio> native (elle
  // survit au verrouillage grâce à la Media Session) et le visualiseur retombe
  // sur l'animation CSS ; l'analyseur temps réel reste réservé au desktop.
  const IS_MOBILE = matchMedia('(pointer: coarse)').matches
    || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  let audioCtx = null, analyser = null, freqData = null, rafId = null, mediaSrc = null;
  function initAnalyser() {
    if (IS_MOBILE) return;
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mediaSrc = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        analyser.smoothingTimeConstant = 0.8;
        mediaSrc.connect(analyser);
        analyser.connect(audioCtx.destination);
        freqData = new Uint8Array(analyser.frequencyBinCount);
      }
      audioCtx.resume();               // le contexte démarre souvent "suspended"
      viz.classList.add('live');
    } catch { /* fallback CSS */ }
  }
  let silentFrames = 0;
  function drawViz() {
    rafId = requestAnimationFrame(drawViz);
    if (!analyser) return;
    analyser.getByteFrequencyData(freqData);
    const maxH = viz.clientHeight - 24;
    const n = barEls.length;
    let total = 0;
    for (let i = 0; i < n; i++) {
      const idx = 2 + Math.floor(Math.pow(i / n, 1.6) * (freqData.length - 6));
      const v = freqData[idx] / 255;
      total += v;
      barEls[i].style.height = Math.max(3, v * v * maxH) + 'px';
    }
    // silence prolongé pendant la lecture : on tente de réveiller le contexte
    // (repli visuel non destructif — l'analyseur est conservé)
    if (total === 0 && !audio.paused) {
      if (++silentFrames === 120 && audioCtx) audioCtx.resume();
    } else silentFrames = 0;
  }
  function startViz() { if (analyser && !rafId) drawViz(); }
  function stopViz() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (viz.classList.contains('live')) barEls.forEach(b => b.style.height = '3px');
  }

  /* ── Genre + programme ── */
  function refreshGenre() {
    const s = currentSlot();
    badgeEl.className = 'genre-badge ' + s.cls;
    badgeEl.textContent = s.icon + '  ' + s.label;
  }
  function fmt2(n) { return String(n).padStart(2, '0'); }
  function renderProgram() {
    const nowSlot = currentSlot();
    progList.innerHTML = '';
    SLOTS.forEach(s => {
      const isNow = s === nowSlot;
      const row = document.createElement('div');
      row.className = 'prog-item' + (isNow ? ' now' : '');
      row.innerHTML =
        '<span class="prog-time">' + fmt2(s.from) + 'h – ' + fmt2(s.to) + 'h</span>' +
        '<span class="prog-label">' + s.icon + ' ' + s.label + '</span>' +
        (isNow ? '<span class="prog-live">● EN COURS</span>' : '');
      progList.appendChild(row);
    });
  }
  refreshGenre();
  renderProgram();
  setInterval(() => { refreshGenre(); renderProgram(); }, 60_000);

  /* ── État lecture ── */
  let playing = false;
  function setUI(state) {
    playing = state === 'playing';
    btnPlay.setAttribute('aria-pressed', playing);
    btnPlay.setAttribute('aria-label', playing ? 'Pause' : 'Lecture');
    icPlay.style.display  = playing ? 'none'  : 'block';
    icPause.style.display = playing ? 'block' : 'none';
    viz.classList.toggle('stopped', !playing);
    const map = {
      playing: { text: 'EN DIRECT' },
      paused:  { text: 'EN PAUSE' },
      loading: { text: 'CONNEXION...' },
      error:   { text: 'ERREUR' },
    };
    footerSt.textContent = (map[state] || map.paused).text;
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
    if (playing) startViz(); else stopViz();
  }

  const TICKER_MSG = 'KALBASS FM ★ LA WEBRADIO 100% ÉLECTRONIQUE DES CARAÏBES ★ 24/7 ★ HOUSE · DISCO · TECH HOUSE · TECHNO ★ ';
  document.getElementById('tickerText').textContent  = TICKER_MSG.repeat(3);
  document.getElementById('tickerText2').textContent = TICKER_MSG.repeat(3);

  /* ── Flux ── */
  let corsOk = true;
  let userStopped = true; // true = l'utilisateur a volontairement coupé la lecture
  function startStream() {
    userStopped = false;
    const wantAnalyser = corsOk && !IS_MOBILE;
    if (wantAnalyser) audio.crossOrigin = 'anonymous'; else audio.removeAttribute('crossorigin');
    audio.src = CONFIG.streamUrl;
    audio.play()
      .then(() => { if (wantAnalyser) initAnalyser(); setUI('playing'); })
      .catch(() => {
        if (wantAnalyser && !audioCtx) { corsOk = false; startStream(); }
        else setUI('error');
      });
  }
  function stopStream() { userStopped = true; audio.pause(); audio.src = ''; setUI('paused'); }
  function togglePlay() {
    if (playing) stopStream();
    else { setUI('loading'); startStream(); }
  }
  btnPlay.addEventListener('click', togglePlay);
  audio.addEventListener('error',   () => { if (playing) setUI('error'); });
  audio.addEventListener('waiting', () => { if (!audio.paused) setUI('loading'); });
  audio.addEventListener('playing', () => setUI('playing'));

  // Écran éteint / onglet masqué : le navigateur coupe parfois le flux ou
  // suspend l'AudioContext (économie d'énergie). On relance activement.
  audio.addEventListener('pause', () => {
    if (!userStopped) audio.play().catch(() => { if (!userStopped) startStream(); });
  });
  document.addEventListener('visibilitychange', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    if (!userStopped && audio.paused) audio.play().catch(() => {});
  });
  // Filet de sécurité périodique : setInterval continue de tourner en fond
  // (contrairement à requestAnimationFrame, qui s'arrête écran éteint).
  setInterval(() => {
    if (userStopped) return;
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    if (audio.paused) audio.play().catch(() => {});
  }, 4000);

  volSlider.addEventListener('input', () => {
    audio.volume = parseFloat(volSlider.value);
    volVal.textContent = Math.round(volSlider.value * 100);
  });

  /* ── Media Session (écran verrouillé mobile) ── */
  function updateMediaSession() {
    if (!('mediaSession' in navigator)) return;
    const art = current.art;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: current.title || 'KALBASS FM',
      artist: current.artist || 'La webradio électronique des Caraïbes',
      album: 'KALBASS FM',
      artwork: art ? [
        { src: art, sizes: '256x256', type: 'image/jpeg' },
        { src: art, sizes: '512x512', type: 'image/jpeg' },
      ] : [
        { src: '/icon-512.png', sizes: '512x512', type: 'image/png' },
      ],
    });
    navigator.mediaSession.setActionHandler('play',  () => { if (!playing) togglePlay(); });
    navigator.mediaSession.setActionHandler('pause', () => { if (playing) togglePlay(); });
    navigator.mediaSession.setActionHandler('stop',  () => stopStream());
  }
  // Dès le chargement, pas seulement après le premier poll now-playing :
  // les contrôles écran verrouillé doivent exister même si l'API est muette.
  updateMediaSession();

  /* ── Liens de recherche + partage ── */
  function updateFindLinks() {
    const q = encodeURIComponent((current.artist + ' ' + current.title).trim());
    findYT.href = 'https://www.youtube.com/results?search_query=' + q;
  }
  shareBtn.addEventListener('click', async () => {
    const label = current.title ? `${current.artist} – ${current.title}` : 'KALBASS FM';
    const text = `🎧 J'écoute ${label} sur KALBASS FM — la webradio 100% électronique des Caraïbes !`;
    const url = 'https://kalbassfm-player.vercel.app/';
    if (navigator.share) {
      try { await navigator.share({ title: 'KALBASS FM', text, url }); } catch {}
    } else {
      window.open('https://wa.me/?text=' + encodeURIComponent(text + ' ' + url), '_blank', 'noopener');
    }
  });

  /* ── Réactions 🔥 (compteur partagé via /api/reactions, sinon local) ── */
  const REACTED = new Set(JSON.parse(localStorage.getItem('kfm_reacted') || '[]'));
  function saveReacted() { localStorage.setItem('kfm_reacted', JSON.stringify([...REACTED].slice(-200))); }

  async function loadReactions(id) {
    reactBtn.disabled = false;
    if (!id) { reactCount.textContent = '0'; return; }
    try {
      const r = await fetch('/api/reactions?id=' + encodeURIComponent(id), { cache: 'no-store' });
      const j = await r.json();
      reactCount.textContent = j.count ?? 0;
    } catch { reactCount.textContent = reactCount.textContent || '0'; }
    reactBtn.classList.toggle('chip-fire', true);
  }
  reactBtn.addEventListener('click', async (e) => {
    const id = current.songId;
    reactCount.textContent = (parseInt(reactCount.textContent, 10) || 0) + 1;
    reactBtn.classList.remove('pop'); void reactBtn.offsetWidth; reactBtn.classList.add('pop');
    // petit 🔥 qui s'envole
    const f = document.createElement('div');
    f.className = 'fire-float'; f.textContent = '🔥';
    f.style.left = e.clientX - 8 + 'px'; f.style.top = e.clientY - 12 + 'px';
    document.body.appendChild(f); setTimeout(() => f.remove(), 900);
    if (!id) return;
    try {
      const r = await fetch('/api/reactions?id=' + encodeURIComponent(id), { method: 'POST', cache: 'no-store' });
      const j = await r.json();
      if (j.enabled && typeof j.count === 'number') reactCount.textContent = j.count;
    } catch {}
    REACTED.add(id); saveReacted();
  });

  /* ── Historique ── */
  function renderHistory(hist) {
    if (!Array.isArray(hist) || !hist.length) { historyList.innerHTML = '<p class="prog-note">Rien pour l\'instant.</p>'; return; }
    historyList.innerHTML = '';
    hist.slice(0, 6).forEach(h => {
      const s = h.song || {};
      const el = document.createElement('div');
      el.className = 'hist-item';
      el.innerHTML =
        '<div class="hist-art" style="' + (s.art ? "background-image:url('" + s.art + "')" : '') + '"></div>' +
        '<div class="hist-meta">' +
          '<div class="hist-title">' + (s.title || '—') + '</div>' +
          '<div class="hist-artist">' + (s.artist || '') + '</div>' +
        '</div>';
      historyList.appendChild(el);
    });
  }

  /* ── Polling now-playing ── */
  let lastId = null;
  async function pollNowPlaying() {
    try {
      const r = await fetch(CONFIG.apiUrl, { cache: 'no-store' });
      if (!r.ok) return;
      const d = await r.json();

      // Auditeurs
      const lc = d.listeners && (d.listeners.current ?? d.listeners.total);
      if (typeof lc === 'number' && lc > 0) {
        listenersCount.textContent = lc + (lc > 1 ? ' EN LIGNE' : ' EN LIGNE');
        listenersEl.classList.add('show');
      } else listenersEl.classList.remove('show');

      // Historique
      renderHistory(d.song_history);

      const np = d.now_playing;
      if (!np || np.sh_id === lastId) return;
      lastId = np.sh_id;

      const song = np.song || {};
      const title = song.title || '—';
      const artist = song.artist || '—';
      current = { title, artist, art: song.art || '', songId: song.id || String(np.sh_id || '') };

      artistEl.textContent = artist.toUpperCase();
      titleEl.textContent = title.length > 26 ? title.toUpperCase() + '   //   ' + title.toUpperCase() : title.toUpperCase();
      titleEl.classList.toggle('scroll', title.length > 26);
      artwork.style.backgroundImage = song.art ? `url("${song.art}")` : '';

      actionsRow.style.display = 'flex';
      updateFindLinks();
      updateMediaSession();
      loadReactions(current.songId);
    } catch { /* silent */ }
  }
  pollNowPlaying();
  setInterval(pollNowPlaying, CONFIG.pollMs);

  /* ── Sleep timer ── */
  const SLEEP_STEPS = [0, 15, 30, 60];
  let sleepIdx = 0, sleepDeadline = 0, sleepTick = null;
  const sleepBtn = document.getElementById('sleepBtn');
  function renderSleep() {
    const mins = SLEEP_STEPS[sleepIdx];
    if (!mins) { sleepBtn.textContent = '💤 OFF'; sleepBtn.classList.remove('on'); return; }
    const left = Math.max(0, Math.ceil((sleepDeadline - Date.now()) / 60000));
    sleepBtn.textContent = '💤 ' + left + ' MIN';
    sleepBtn.classList.add('on');
  }
  sleepBtn.addEventListener('click', () => {
    sleepIdx = (sleepIdx + 1) % SLEEP_STEPS.length;
    const mins = SLEEP_STEPS[sleepIdx];
    clearInterval(sleepTick);
    if (mins) {
      sleepDeadline = Date.now() + mins * 60000;
      sleepTick = setInterval(() => {
        if (Date.now() >= sleepDeadline) { clearInterval(sleepTick); sleepIdx = 0; if (playing) stopStream(); }
        renderSleep();
      }, 1000);
    }
    renderSleep();
  });

  /* ── PWA : installation + service worker ── */
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('show');
    maybeShowInstallToast();
  });
  installBtn.addEventListener('click', () => promptInstall());
  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('show');
    hideInstallToast();
    localStorage.setItem('kfm_installed', '1');
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }

  /* ── Bandeau d'invitation à l'installation (mobile) ── */
  const DISMISS_DAYS = 14;
  const toast     = document.getElementById('installToast');
  const toastText = document.getElementById('installToastText');
  const toastCta  = document.getElementById('installToastCta');

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }
  function isMobile() {
    return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.matchMedia('(max-width: 640px)').matches;
  }
  function recentlyDismissed() {
    const t = parseInt(localStorage.getItem('kfm_install_dismissed_at') || '0', 10);
    return t && (Date.now() - t) < DISMISS_DAYS * 86400000;
  }

  function hideInstallToast() { toast.classList.remove('show'); }
  function dismissInstallToast() {
    localStorage.setItem('kfm_install_dismissed_at', String(Date.now()));
    hideInstallToast();
  }

  async function promptInstall() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.classList.remove('show');
    hideInstallToast();
  }

  function maybeShowInstallToast() {
    if (localStorage.getItem('kfm_installed') === '1') return;
    if (isStandalone() || !isMobile() || recentlyDismissed()) return;

    if (isIOS()) {
      toastText.innerHTML =
        'Appuyez sur <svg class="install-toast-share-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 16V4M7 8l5-5 5 5M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg> ' +
        'puis « Sur l\'écran d\'accueil » pour une meilleure expérience.';
      toastCta.style.display = 'none';
    } else if (deferredPrompt) {
      toastText.textContent = 'Accès direct depuis votre écran d\'accueil, sans navigateur, même écran verrouillé.';
      toastCta.style.display = '';
      toastCta.textContent = 'Installer';
      toastCta.onclick = () => promptInstall();
    } else {
      // Navigateur mobile sans evenement beforeinstallprompt (Firefox Android, etc.)
      toastText.textContent = 'Ouvrez le menu de votre navigateur puis « Ajouter à l\'écran d\'accueil » pour une meilleure expérience.';
      toastCta.style.display = 'none';
    }
    toast.classList.add('show');
  }

  document.getElementById('installToastClose').addEventListener('click', dismissInstallToast);
  document.getElementById('installToastLater').addEventListener('click', dismissInstallToast);

  // iOS et certains navigateurs mobiles ne declenchent jamais beforeinstallprompt :
  // on programme un affichage de repli independant de l'evenement natif.
  setTimeout(maybeShowInstallToast, 3500);
  </script>
</body>
</html>
